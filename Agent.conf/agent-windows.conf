<agent_config>
    <!-- Windows Event Log Collection -->
    <localfile>
      <location>System</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <localfile>
      <location>Application</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <localfile>
      <location>Microsoft-Windows-Sysmon/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <localfile>
      <location>Microsoft-Windows-PowerShell/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <localfile>
      <location>Microsoft-Windows-Windows Defender/Operational</location>
      <log_format>eventchannel</log_format>
    </localfile>
    <syscheck>
      <frequency>43200</frequency>
      <scan_on_start>yes</scan_on_start>
      <!-- Critical directories -->
      <directories check_all="yes" realtime="yes">%PROGRAMDATA%\Microsoft\Windows\Start Menu\Programs\StartUp</directories>
      <directories check_all="yes" realtime="yes">%USERPROFILE%\AppData\Roaming\Microsoft\Windows\Start Menu\Programs\Startup</directories>
      <directories check_all="yes" realtime="yes">C:\Program Files</directories>
      <directories check_all="yes" realtime="yes">C:\Program Files (x86)</directories>
      <directories check_all="yes">C:\Downloads</directories>
      <ignore>C:\Program Files (x86)\ossec-agent\wazuh-agent.state</ignore>
      <ignore>C:\Program Files (x86)\ossec-agent\wazuh-logcollector.state</ignore>
      <ignore>C:\Program Files (x86)\ossec-agent\queue\logcollector\file_status.json</ignore>
      <ignore>C:\Program Files (x86)\ossec-agent\queue\syscollector\db</ignore>
      <!-- Registry keys -->
      <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run</windows_registry>
      <windows_registry arch="both">HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\RunOnce</windows_registry>
      <!-- Ignores -->
      <ignore type="sregex">.log$|.tmp$|.temp$</ignore>
      <synchronization>
        <enabled>yes</enabled>
        <interval>5m</interval>
        <max_eps>10</max_eps>
      </synchronization>
    </syscheck>
    <integration>
      <name>virustotal</name>
      <api_key>d6fe21fb5729afec9eb2beb748bc97c6d3575c1057d6a820980ea1a5d39a15b5</api_key>
      <group>syscheck</group>
      <alert_format>json</alert_format>
    </integration>
  </agent_config>
