<agent_config>
    <!-- Authentication logs (SSH, sudo, login) - Debian/Ubuntu -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/auth.log</location>
    </localfile>
    <!-- General system messages - Debian/Ubuntu -->
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/syslog</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/kern.log</location>
    </localfile>
    <localfile>
      <log_format>syslog</log_format>
      <location>/var/log/audit/audit.log</location>
    </localfile>
    <localfile>
      <log_format>apache</log_format>
      <location>/var/log/dvwa/access.log</location>
    </localfile>
    <!-- FIM -->
    <syscheck>
      <directories realtime="yes" check_all="yes">/etc,/usr/bin,/usr/sbin,/bin,/sbin,/boot ,/home/kali/Downloads/</directories>
      <directories check_all="yes">/tmp,/var/tmp,/dev/shm</directories>
      <directories check_all="yes">/home</directories>
      <ignore>/etc/mtab</ignore>
      <ignore>/etc/prelink.cache</ignore>
    </syscheck>
    <!-- Command monitoring -->
    <localfile>
      <log_format>full_command</log_format>
      <command>last -n 20</command>
      <frequency>360</frequency>
    </localfile>
    <client_buffer>
      <queue_size>15000</queue_size>
      <events_per_second>500</events_per_second>
    </client_buffer>
  </agent_config>